name: Build EGoTouch KMDF (ARM64)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "KernelDriver/EGoTouchKm/**"
      - "scripts/build_kmdf_driver.bat"
      - ".github/workflows/build-kmdf-arm64.yml"
  pull_request:
    paths:
      - "KernelDriver/EGoTouchKm/**"
      - "scripts/build_kmdf_driver.bat"
      - ".github/workflows/build-kmdf-arm64.yml"

jobs:
  build-arm64-kmdf:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Ensure Windows Driver Kit (WDK)
        shell: pwsh
        run: |
          function Find-WdkTargets {
            $roots = @(
              "$env:ProgramFiles(x86)\Windows Kits\10\build",
              "$env:ProgramFiles\Windows Kits\10\build",
              "$env:ProgramFiles(x86)\Windows Kits\10\Build",
              "$env:ProgramFiles\Windows Kits\10\Build"
            )

            foreach ($r in $roots) {
              if (Test-Path $r) {
                $hit = Get-ChildItem -Path $r -Filter "WindowsDriver.Common.targets" -Recurse -ErrorAction SilentlyContinue |
                  Sort-Object FullName -Descending |
                  Select-Object -First 1
                if ($hit) {
                  return $hit.FullName
                }
              }
            }

            return $null
          }

          $wdkTargets = Find-WdkTargets
          if ($wdkTargets) {
            Write-Host "WDK already present: $wdkTargets"
            exit 0
          }

          choco install windowsdriverkit10 --yes --no-progress

          $wdkTargets = Find-WdkTargets
          if ($wdkTargets) {
            Write-Host "WDK installed and detected: $wdkTargets"
          } else {
            Write-Warning "WDK install command succeeded but WindowsDriver.Common.targets was not found in common paths."
            Write-Warning "Continuing to build so we can capture full MSBuild diagnostics."
          }

      - name: Show WDK/SDK path snapshot
        shell: pwsh
        run: |
          Get-ChildItem "C:\Program Files (x86)\Windows Kits\10" -Depth 2 -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Build KMDF driver (Release|ARM64)
        shell: pwsh
        run: |
          $ntddk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" -Filter ntddk.h -Recurse -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $ntddk) {
            throw "ntddk.h not found after WDK installation."
          }

          $kmDir = Split-Path $ntddk.FullName -Parent
          $verRoot = Split-Path $kmDir -Parent
          $sharedDir = Join-Path $verRoot "shared"

          $versionName = Split-Path $verRoot -Leaf
          $libRoot = "C:\Program Files (x86)\Windows Kits\10\Lib\$versionName"
          $kmLibArm64 = Join-Path $libRoot "km\arm64"

          Write-Host "Detected WDK include root: $verRoot"
          Write-Host "Detected WDK lib root: $libRoot"

          # Kernel-mode build should not mix UCRT/UM include+lib paths.
          $env:INCLUDE = "$kmDir;$sharedDir;$env:INCLUDE"
          $env:LIB = "$kmLibArm64;$env:LIB"

          # CI runner currently has unstable InfVerif/ApiValidator dependencies.
          # Build compile+link outputs directly to guarantee ARM64 .sys artifact generation.
          & msbuild "KernelDriver\EGoTouchKm\EGoTouchKm.vcxproj" "/t:ClCompile" "/p:Configuration=Release" "/p:Platform=ARM64" "/p:OutDir=build\\kmdf\\Release\\" "/p:IntDir=build\\kmdf\\obj\\Release\\" "/m"
          & msbuild "KernelDriver\EGoTouchKm\EGoTouchKm.vcxproj" "/t:Link" "/p:Configuration=Release" "/p:Platform=ARM64" "/p:OutDir=build\\kmdf\\Release\\" "/p:IntDir=build\\kmdf\\obj\\Release\\" "/m"

          $sys = "KernelDriver\EGoTouchKm\build\kmdf\Release\EGoTouchKm.sys"
          if (-not (Test-Path $sys)) {
            Write-Warning "Expected output not found at $sys. Dumping all .sys under project:"
            Get-ChildItem "KernelDriver\EGoTouchKm" -Recurse -Filter *.sys -ErrorAction SilentlyContinue | Select-Object FullName
            throw "Driver binary .sys was not generated."
          }

      - name: Collect build artifacts
        shell: pwsh
        run: |
          $artifactDir = "${{ github.workspace }}\artifact-kmdf-arm64"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $patterns = @("*.sys", "*.pdb", "*.cat", "*.cer", "*.inf", "*.map", "*.lib", "*.exp")
          $collected = @()
          foreach ($pat in $patterns) {
            $hits = Get-ChildItem "KernelDriver\EGoTouchKm" -Recurse -Filter $pat -ErrorAction SilentlyContinue
            foreach ($h in $hits) {
              Copy-Item $h.FullName $artifactDir -Force
              $collected += $h
            }
          }

          Copy-Item "KernelDriver\EGoTouchKm\EGoTouchKm.inf" $artifactDir -Force
          Copy-Item "scripts\install_kmdf_driver.bat" $artifactDir -Force
          Copy-Item "scripts\uninstall_kmdf_driver.bat" $artifactDir -Force

          if (-not ($collected | Where-Object { $_.Extension -ieq ".sys" })) {
            throw "No .sys driver file collected into artifact."
          }

          Write-Host "Collected files:"
          Get-ChildItem $artifactDir | Select-Object Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EGoTouchKm-ARM64
          path: artifact-kmdf-arm64
          if-no-files-found: error
